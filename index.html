<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lens - Obyektlarni Aniqlash</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- ml5.js library for Machine Learning -->
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
</head>
<body>
    <div class="app-background">
        <div class="gradient-sphere pink"></div>
        <div class="gradient-sphere blue"></div>
    </div>

    <div class="container">
        <header>
            <h1>AI <span>Lens</span></h1>
            <p>Obyektni kameraga ko'rsating va tezkor ma'lumotga ega bo'ling.</p>
        </header>

        <main>
            <!-- Camera Section -->
            <div class="camera-card">
                <div class="video-container" id="videoContainer">
                    <video id="videoElement" autoplay playsinline></video>
                    
                    <!-- UI Elements over video -->
                    <div class="scan-line" id="scanLine"></div>
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                    <div class="status-badge" id="modelStatus">
                        <span class="status-dot"></span> Model yuklanmoqda...
                    </div>
                </div>
                
                <button id="captureBtn" class="primary-btn" disabled>
                    <span class="btn-text">Ob'ektni Aniqlash</span>
                    <span class="loader" id="btnLoader" style="display: none;"></span>
                </button>
            </div>

            <!-- Result Section -->
            <div id="resultCard" class="result-card hidden">
                <div class="result-header">
                    <div class="result-title">
                        <h2>Topilgan obyekt</h2>
                    </div>
                    <div class="confidence-badge" id="confidenceBadge">0% Aniq</div>
                </div>
                
                <h3 id="objectName" class="object-name">...</h3>
                
                <div class="wiki-section">
                    <h4>Wikipedia (Ingliz tilida)</h4>
                    <p id="wikiText" class="wiki-text">Ma'lumot qidirilmoqda...</p>
                    <a id="wikiLink" href="#" target="_blank" class="wiki-link hidden">Vikipediyada o'qish &rarr;</a>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
